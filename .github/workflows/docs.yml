name: Metis Documentation

on:
  push:
    branches: [ main ]
    paths:
      - '**.md'
      - '**.py'
      - 'infra/**'

jobs:
  generate-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate Project Structure
        run: |
          echo "# Metis Project Structure" > docs/structure.md
          echo "Generated on: $(date)" >> docs/structure.md
          echo "\`\`\`text" >> docs/structure.md
          tree -L 3 >> docs/structure.md
          echo "\`\`\`" >> docs/structure.md

      - name: Auto-Commit Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: update automated project documentation"
          file_pattern: 'docs/*.md'